<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlightScope 3D | Real-Time Aircraft Visualizer</title>
  <style>
    :root {
      --bg: #03060a;
      --panel: rgba(8, 14, 24, 0.72);
      --panel-strong: rgba(10, 18, 31, 0.9);
      --line: rgba(181, 210, 255, 0.18);
      --text: #f4f8ff;
      --muted: #9caec8;
      --cyan: #52e4ff;
      --green: #8cffb4;
      --amber: #ffd166;
      --red: #ff6b7a;
      --shadow: 0 20px 70px rgba(0, 0, 0, 0.38);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      touch-action: none;
    }

    button,
    input {
      font: inherit;
    }

    #app {
      position: fixed;
      inset: 0;
      isolation: isolate;
    }

    canvas.webgl {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      outline: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 50% 46%, transparent 0, rgba(3, 6, 10, 0.16) 50%, rgba(3, 6, 10, 0.76) 100%),
        linear-gradient(180deg, rgba(3, 6, 10, 0.35), transparent 32%, rgba(3, 6, 10, 0.64));
      z-index: 2;
    }

    .topbar {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      z-index: 4;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      pointer-events: none;
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      background: linear-gradient(135deg, rgba(8, 14, 24, 0.86), rgba(8, 14, 24, 0.48));
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      pointer-events: auto;
    }

    .logo {
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 50%, rgba(82, 228, 255, 0.38), transparent 50%),
        conic-gradient(from 210deg, #52e4ff, #8cffb4, #ffd166, #52e4ff);
      box-shadow: 0 0 28px rgba(82, 228, 255, 0.35);
    }

    .logo svg {
      width: 24px;
      height: 24px;
      fill: #031016;
    }

    .brand-text {
      min-width: 0;
    }

    .brand strong {
      display: block;
      font-size: 0.92rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .brand span {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 11px 13px;
      border: 1px solid rgba(140, 255, 180, 0.3);
      border-radius: 999px;
      background: rgba(6, 18, 18, 0.72);
      color: var(--green);
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      pointer-events: auto;
    }

    .pulse {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 rgba(140, 255, 180, 0.75);
      animation: pulse 1.7s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(140, 255, 180, 0.65); }
      70% { box-shadow: 0 0 0 12px rgba(140, 255, 180, 0); }
      100% { box-shadow: 0 0 0 0 rgba(140, 255, 180, 0); }
    }

    .hud {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 4;
      width: min(392px, calc(100vw - 36px));
      display: grid;
      gap: 12px;
      pointer-events: none;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      pointer-events: auto;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      overflow: hidden;
    }

    .metric {
      padding: 14px;
      border-right: 1px solid var(--line);
    }

    .metric:last-child {
      border-right: 0;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: clamp(1.1rem, 3.4vw, 1.55rem);
      line-height: 1;
      font-weight: 800;
    }

    .flight-list {
      max-height: 236px;
      overflow: hidden;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 14px 10px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .flight-row {
      display: grid;
      grid-template-columns: 70px 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 11px 14px;
      border-bottom: 1px solid rgba(181, 210, 255, 0.09);
    }

    .flight-row:last-child {
      border-bottom: 0;
    }

    .flight-id {
      color: var(--cyan);
      font-size: 0.83rem;
      font-weight: 850;
      letter-spacing: 0.05em;
    }

    .route {
      min-width: 0;
      color: var(--text);
      font-size: 0.82rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .altitude {
      color: var(--muted);
      font-size: 0.78rem;
      font-variant-numeric: tabular-nums;
    }

    .controls {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 4;
      width: min(310px, calc(100vw - 36px));
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .control-row {
      display: grid;
      gap: 7px;
    }

    .control-label {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: var(--muted);
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--cyan);
    }

    .button-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .icon-btn {
      min-height: 42px;
      border: 1px solid rgba(181, 210, 255, 0.2);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .icon-btn:hover,
    .icon-btn.active {
      border-color: rgba(82, 228, 255, 0.56);
      background: rgba(82, 228, 255, 0.14);
      transform: translateY(-1px);
    }

    .icon-btn svg {
      width: 19px;
      height: 19px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hint {
      position: absolute;
      left: 50%;
      bottom: 22px;
      transform: translateX(-50%);
      z-index: 3;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(181, 210, 255, 0.13);
      background: rgba(3, 6, 10, 0.5);
      color: rgba(244, 248, 255, 0.68);
      font-size: 0.76rem;
      backdrop-filter: blur(12px);
      pointer-events: none;
      white-space: nowrap;
    }

    .loading {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 42%, rgba(82, 228, 255, 0.12), transparent 38%), #03060a;
      transition: opacity 0.45s ease, visibility 0.45s ease;
    }

    .loading.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader {
      width: min(320px, calc(100vw - 48px));
      padding: 20px;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(8, 14, 24, 0.72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .loader-ring {
      width: 56px;
      height: 56px;
      margin: 0 auto 14px;
      border-radius: 50%;
      border: 2px solid rgba(82, 228, 255, 0.16);
      border-top-color: var(--cyan);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loader strong {
      display: block;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .loader span {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    @media (max-width: 880px) {
      .topbar {
        align-items: flex-start;
      }

      .status-pill {
        font-size: 0;
        width: 42px;
        height: 42px;
        padding: 0;
        justify-content: center;
      }

      .hud {
        right: 18px;
        width: auto;
      }

      .controls {
        left: 18px;
        right: 18px;
        bottom: 18px;
        width: auto;
        grid-template-columns: 1fr;
      }

      .flight-list {
        display: none;
      }

      .hint {
        display: none;
      }
    }

    @media (max-width: 620px) {
      .topbar {
        top: 12px;
        left: 12px;
        right: 12px;
      }

      .brand {
        max-width: calc(100vw - 78px);
        padding: 10px;
      }

      .logo {
        width: 34px;
        height: 34px;
      }

      .brand strong {
        font-size: 0.78rem;
      }

      .brand span {
        font-size: 0.68rem;
      }

      .hud {
        left: 12px;
        right: 12px;
        bottom: 148px;
      }

      .metric {
        padding: 11px 10px;
      }

      .metric span {
        font-size: 0.62rem;
      }

      .controls {
        left: 12px;
        right: 12px;
        bottom: 12px;
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <main id="app" aria-label="3D real-time flight visualizer">
    <canvas class="webgl" aria-label="Rotatable 3D Earth with simulated aircraft positions"></canvas>
    <div class="vignette"></div>

    <header class="topbar">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24"><path d="M2.6 12.2 21.4 3.7 16.2 21l-4.6-7.1-7.9 2.9 5.6-5.1z"/></svg>
        </div>
        <div class="brand-text">
          <strong>FlightScope 3D</strong>
          <span>Interpolated aircraft telemetry</span>
        </div>
      </div>
      <div class="status-pill" aria-live="polite">
        <span class="pulse"></span>
        <span>Live Simulation</span>
      </div>
    </header>

    <section class="hud" aria-label="Flight telemetry">
      <div class="panel metrics">
        <div class="metric">
          <span>Tracked</span>
          <strong id="trackedCount">0</strong>
        </div>
        <div class="metric">
          <span>Avg Speed</span>
          <strong id="avgSpeed">0 kt</strong>
        </div>
        <div class="metric">
          <span>Updated</span>
          <strong id="lastUpdate">--:--</strong>
        </div>
      </div>
      <div class="panel flight-list">
        <div class="panel-title">
          <span>Active Flights</span>
          <span id="feedRate">2.8s feed</span>
        </div>
        <div id="flightRows"></div>
      </div>
    </section>

    <section class="panel controls" aria-label="Scene controls">
      <div class="control-row">
        <label class="control-label" for="speedRange">
          <span>Simulation Speed</span>
          <span id="speedValue">1.0x</span>
        </label>
        <input id="speedRange" type="range" min="0.25" max="3" step="0.05" value="1" />
      </div>
      <div class="button-row">
        <button class="icon-btn active" id="rotateToggle" type="button" title="Toggle earth rotation" aria-label="Toggle earth rotation">
          <svg viewBox="0 0 24 24"><path d="M21 12a9 9 0 0 1-9 9 9.5 9.5 0 0 1-6.7-2.8"/><path d="M3 12a9 9 0 0 1 9-9 9.5 9.5 0 0 1 6.7 2.8"/><path d="M3 20v-5h5"/><path d="M21 4v5h-5"/></svg>
        </button>
        <button class="icon-btn active" id="trailsToggle" type="button" title="Toggle flight trails" aria-label="Toggle flight trails">
          <svg viewBox="0 0 24 24"><path d="M4 17c4-6 8-6 12 0"/><path d="M3 12c5-7 11-7 18 0"/><path d="M8 21h8"/></svg>
        </button>
        <button class="icon-btn" id="resetView" type="button" title="Reset camera" aria-label="Reset camera">
          <svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 3v6h6"/></svg>
        </button>
      </div>
    </section>

    <p class="hint">Drag to rotate, scroll or pinch to zoom, tap aircraft for telemetry</p>

    <div class="loading" id="loading">
      <div class="loader">
        <div class="loader-ring"></div>
        <strong>Initializing Scene</strong>
        <span>Building Earth, stars, and aircraft telemetry</span>
      </div>
    </div>
  </main>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.164.1/build/three.module.js"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "https://unpkg.com/three@0.164.1/examples/jsm/controls/OrbitControls.js";

    const canvas = document.querySelector(".webgl");
    const loading = document.getElementById("loading");
    const trackedCount = document.getElementById("trackedCount");
    const avgSpeed = document.getElementById("avgSpeed");
    const lastUpdate = document.getElementById("lastUpdate");
    const feedRate = document.getElementById("feedRate");
    const flightRows = document.getElementById("flightRows");
    const speedRange = document.getElementById("speedRange");
    const speedValue = document.getElementById("speedValue");
    const rotateToggle = document.getElementById("rotateToggle");
    const trailsToggle = document.getElementById("trailsToggle");
    const resetView = document.getElementById("resetView");

    const EARTH_RADIUS = 4;
    const AIRCRAFT_ALTITUDE = 0.19;
    const TARGET_INTERVAL = 2800;
    const clock = new THREE.Clock();
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    let simulationSpeed = 1;
    let rotateEarth = true;
    let showTrails = true;
    let lastFeedTime = performance.now();
    let selectedAircraft = null;

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x02050a, 0.018);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 900);
    camera.position.set(0, 4.7, 11.5);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      powerPreference: "high-performance"
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.08;

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.055;
    controls.minDistance = 6.2;
    controls.maxDistance = 18;
    controls.rotateSpeed = 0.42;
    controls.zoomSpeed = 0.72;
    controls.target.set(0, 0.1, 0);

    const earthGroup = new THREE.Group();
    const aircraftGroup = new THREE.Group();
    const trailsGroup = new THREE.Group();
    scene.add(earthGroup, aircraftGroup, trailsGroup);

    const sunLight = new THREE.DirectionalLight(0xffffff, 3.2);
    sunLight.position.set(-6, 4, 8);
    scene.add(sunLight);

    const fillLight = new THREE.DirectionalLight(0x5eaaff, 0.85);
    fillLight.position.set(5, -2, -6);
    scene.add(fillLight);

    const rimLight = new THREE.DirectionalLight(0x7df7ff, 1.3);
    rimLight.position.set(0, 5, -8);
    scene.add(rimLight);

    scene.add(new THREE.AmbientLight(0x9cb6d8, 0.28));

    function createEarthTexture() {
      const size = 2048;
      const canvasTexture = document.createElement("canvas");
      canvasTexture.width = size;
      canvasTexture.height = size / 2;
      const ctx = canvasTexture.getContext("2d");
      const ocean = ctx.createLinearGradient(0, 0, 0, canvasTexture.height);
      ocean.addColorStop(0, "#0d3d63");
      ocean.addColorStop(0.48, "#071f3a");
      ocean.addColorStop(1, "#04152d");
      ctx.fillStyle = ocean;
      ctx.fillRect(0, 0, canvasTexture.width, canvasTexture.height);

      ctx.globalAlpha = 0.28;
      for (let i = 0; i < 520; i++) {
        const x = Math.random() * canvasTexture.width;
        const y = Math.random() * canvasTexture.height;
        const r = 18 + Math.random() * 110;
        const grd = ctx.createRadialGradient(x, y, 0, x, y, r);
        grd.addColorStop(0, "rgba(48, 172, 190, 0.42)");
        grd.addColorStop(1, "rgba(48, 172, 190, 0)");
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      const continents = [
        [[0.18,0.34],[0.22,0.24],[0.29,0.2],[0.34,0.3],[0.31,0.42],[0.25,0.48],[0.19,0.43]],
        [[0.29,0.49],[0.34,0.54],[0.36,0.66],[0.33,0.83],[0.29,0.77],[0.27,0.62]],
        [[0.46,0.28],[0.56,0.22],[0.66,0.28],[0.72,0.4],[0.65,0.55],[0.52,0.53],[0.44,0.42]],
        [[0.51,0.54],[0.59,0.58],[0.62,0.72],[0.56,0.82],[0.49,0.68]],
        [[0.68,0.34],[0.8,0.28],[0.91,0.42],[0.85,0.62],[0.7,0.58],[0.62,0.48]],
        [[0.76,0.68],[0.84,0.66],[0.89,0.76],[0.82,0.86],[0.74,0.78]]
      ];

      continents.forEach((points) => {
        ctx.save();
        ctx.beginPath();
        points.forEach(([px, py], index) => {
          const x = px * canvasTexture.width;
          const y = py * canvasTexture.height;
          if (index === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.closePath();
        const land = ctx.createLinearGradient(0, 0, canvasTexture.width, canvasTexture.height);
        land.addColorStop(0, "#226b54");
        land.addColorStop(0.5, "#4d8b61");
        land.addColorStop(1, "#b4a06a");
        ctx.fillStyle = land;
        ctx.shadowColor = "rgba(115, 255, 197, 0.18)";
        ctx.shadowBlur = 24;
        ctx.fill();
        ctx.clip();
        ctx.globalAlpha = 0.18;
        for (let i = 0; i < 90; i++) {
          ctx.fillStyle = Math.random() > 0.5 ? "#e5ca82" : "#114b3e";
          ctx.beginPath();
          ctx.arc(Math.random() * canvasTexture.width, Math.random() * canvasTexture.height, 6 + Math.random() * 36, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });

      ctx.globalAlpha = 0.42;
      ctx.strokeStyle = "rgba(200, 236, 255, 0.18)";
      ctx.lineWidth = 1;
      for (let lat = -60; lat <= 60; lat += 30) {
        const y = ((90 - lat) / 180) * canvasTexture.height;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvasTexture.width, y);
        ctx.stroke();
      }
      for (let lon = 0; lon < 360; lon += 30) {
        const x = (lon / 360) * canvasTexture.width;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvasTexture.height);
        ctx.stroke();
      }

      const texture = new THREE.CanvasTexture(canvasTexture);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
      return texture;
    }

    function createCloudTexture() {
      const size = 1024;
      const cloudCanvas = document.createElement("canvas");
      cloudCanvas.width = size;
      cloudCanvas.height = size / 2;
      const ctx = cloudCanvas.getContext("2d");
      ctx.clearRect(0, 0, cloudCanvas.width, cloudCanvas.height);
      for (let i = 0; i < 440; i++) {
        const x = Math.random() * cloudCanvas.width;
        const y = Math.random() * cloudCanvas.height;
        const rx = 24 + Math.random() * 90;
        const ry = 5 + Math.random() * 18;
        const alpha = 0.035 + Math.random() * 0.06;
        ctx.fillStyle = `rgba(255,255,255,${alpha})`;
        ctx.beginPath();
        ctx.ellipse(x, y, rx, ry, Math.random() * Math.PI, 0, Math.PI * 2);
        ctx.fill();
      }
      const texture = new THREE.CanvasTexture(cloudCanvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    const earth = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_RADIUS, 96, 96),
      new THREE.MeshStandardMaterial({
        map: createEarthTexture(),
        roughness: 0.82,
        metalness: 0.02
      })
    );
    earthGroup.add(earth);

    const clouds = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_RADIUS + 0.035, 96, 96),
      new THREE.MeshStandardMaterial({
        map: createCloudTexture(),
        transparent: true,
        opacity: 0.62,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      })
    );
    earthGroup.add(clouds);

    const atmosphere = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_RADIUS + 0.16, 96, 96),
      new THREE.MeshBasicMaterial({
        color: 0x64dfff,
        transparent: true,
        opacity: 0.14,
        side: THREE.BackSide,
        blending: THREE.AdditiveBlending
      })
    );
    earthGroup.add(atmosphere);

    const terminator = new THREE.Mesh(
      new THREE.SphereGeometry(EARTH_RADIUS + 0.006, 96, 96),
      new THREE.MeshBasicMaterial({
        color: 0x020712,
        transparent: true,
        opacity: 0.24,
        side: THREE.FrontSide
      })
    );
    terminator.rotation.y = Math.PI * 0.58;
    earthGroup.add(terminator);

    function createStarfield() {
      const count = 2600;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const color = new THREE.Color();
      for (let i = 0; i < count; i++) {
        const radius = 70 + Math.random() * 340;
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(THREE.MathUtils.randFloatSpread(2));
        positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = radius * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = radius * Math.cos(phi);
        color.setHSL(0.56 + Math.random() * 0.12, 0.34, 0.72 + Math.random() * 0.25);
        colors[i * 3] = color.r;
        colors[i * 3 + 1] = color.g;
        colors[i * 3 + 2] = color.b;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      geometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
      const material = new THREE.PointsMaterial({
        size: 0.42,
        sizeAttenuation: true,
        vertexColors: true,
        transparent: true,
        opacity: 0.9
      });
      return new THREE.Points(geometry, material);
    }

    const stars = createStarfield();
    scene.add(stars);

    const routes = [
      { id: "AAL245", from: "Los Angeles", to: "New York", lat: 34.05, lon: -118.24, heading: 63, speed: 486, alt: 37000 },
      { id: "BAW18", from: "London", to: "Singapore", lat: 51.47, lon: -0.45, heading: 94, speed: 504, alt: 39000 },
      { id: "DLH431", from: "Chicago", to: "Frankfurt", lat: 41.98, lon: -87.9, heading: 52, speed: 493, alt: 35000 },
      { id: "UAE202", from: "Dubai", to: "Mumbai", lat: 25.25, lon: 55.36, heading: 116, speed: 461, alt: 33000 },
      { id: "QFA12", from: "Tokyo", to: "Sydney", lat: 35.55, lon: 139.78, heading: 170, speed: 477, alt: 41000 },
      { id: "AFR76", from: "Paris", to: "Cairo", lat: 49.01, lon: 2.55, heading: 132, speed: 452, alt: 34000 },
      { id: "SAA211", from: "Cape Town", to: "Johannesburg", lat: -33.97, lon: 18.6, heading: 42, speed: 428, alt: 31000 },
      { id: "ACA880", from: "Vancouver", to: "Seoul", lat: 49.19, lon: -123.18, heading: 302, speed: 499, alt: 38000 },
      { id: "LAN532", from: "Santiago", to: "Lima", lat: -33.39, lon: -70.79, heading: 349, speed: 438, alt: 32000 },
      { id: "KLM602", from: "Amsterdam", to: "Toronto", lat: 52.31, lon: 4.76, heading: 292, speed: 487, alt: 36000 },
      { id: "JBU1407", from: "Miami", to: "Bogota", lat: 25.79, lon: -80.29, heading: 174, speed: 431, alt: 30000 },
      { id: "ANA7", from: "San Francisco", to: "Tokyo", lat: 37.62, lon: -122.38, heading: 304, speed: 506, alt: 40000 }
    ];

    const aircraftMaterial = new THREE.MeshStandardMaterial({
      color: 0x9ff7ff,
      emissive: 0x1ac8ff,
      emissiveIntensity: 0.55,
      metalness: 0.35,
      roughness: 0.32
    });

    const selectedMaterial = new THREE.MeshStandardMaterial({
      color: 0xffd166,
      emissive: 0xffaa33,
      emissiveIntensity: 0.75,
      metalness: 0.35,
      roughness: 0.28
    });

    function latLonToVector3(lat, lon, radius = EARTH_RADIUS) {
      const phi = THREE.MathUtils.degToRad(90 - lat);
      const theta = THREE.MathUtils.degToRad(lon + 180);
      return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    function bearingToQuaternion(lat, lon, heading) {
      const position = latLonToVector3(lat, lon, EARTH_RADIUS + AIRCRAFT_ALTITUDE).normalize();
      const north = latLonToVector3(Math.min(lat + 0.1, 89.9), lon, EARTH_RADIUS + AIRCRAFT_ALTITUDE).normalize();
      const tangentNorth = north.sub(position.clone().multiplyScalar(north.dot(position))).normalize();
      const tangentEast = new THREE.Vector3().crossVectors(tangentNorth, position).normalize();
      const headingRad = THREE.MathUtils.degToRad(heading);
      const forward = tangentNorth.multiplyScalar(Math.cos(headingRad)).add(tangentEast.multiplyScalar(Math.sin(headingRad))).normalize();
      const right = new THREE.Vector3().crossVectors(forward, position).normalize();
      const up = position.clone();
      const matrix = new THREE.Matrix4().makeBasis(right, up, forward);
      return new THREE.Quaternion().setFromRotationMatrix(matrix);
    }

    function createAircraftMesh() {
      const craft = new THREE.Group();
      const fuselage = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.28, 4), aircraftMaterial);
      fuselage.rotation.x = Math.PI / 2;
      const wings = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.014, 0.07), aircraftMaterial);
      wings.position.z = -0.025;
      const tail = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.012, 0.08), aircraftMaterial);
      tail.position.z = -0.13;
      const beacon = new THREE.Mesh(new THREE.SphereGeometry(0.035, 16, 16), new THREE.MeshBasicMaterial({ color: 0x52e4ff }));
      beacon.position.y = 0.045;
      craft.add(fuselage, wings, tail, beacon);
      craft.scale.setScalar(1.55);
      return craft;
    }

    function makeTrail(points) {
      const geometry = new THREE.BufferGeometry().setFromPoints(points);
      const material = new THREE.LineBasicMaterial({
        color: 0x52e4ff,
        transparent: true,
        opacity: 0.34,
        blending: THREE.AdditiveBlending
      });
      return new THREE.Line(geometry, material);
    }

    const aircraft = routes.map((flight, index) => {
      const mesh = createAircraftMesh();
      const initial = {
        lat: flight.lat + THREE.MathUtils.randFloatSpread(6),
        lon: flight.lon + THREE.MathUtils.randFloatSpread(8),
        heading: flight.heading,
        alt: flight.alt,
        speed: flight.speed
      };
      const next = { ...initial };
      const trailPoints = Array.from({ length: 36 }, (_, i) => {
        const offset = i * -0.34;
        return latLonToVector3(initial.lat - Math.sin(THREE.MathUtils.degToRad(initial.heading)) * offset, initial.lon - Math.cos(THREE.MathUtils.degToRad(initial.heading)) * offset, EARTH_RADIUS + 0.105);
      });
      const trail = makeTrail(trailPoints);
      aircraftGroup.add(mesh);
      trailsGroup.add(trail);
      return {
        ...flight,
        mesh,
        trail,
        current: initial,
        start: { ...initial },
        target: next,
        progress: Math.random(),
        seed: index * 11.37,
        trailPoints
      };
    });

    function randomizeTarget(flight) {
      flight.start = { ...flight.current };
      const distance = 0.8 + Math.random() * 2.2;
      const turn = THREE.MathUtils.randFloatSpread(26);
      const heading = (flight.current.heading + turn + 360) % 360;
      const headingRad = THREE.MathUtils.degToRad(heading);
      const lat = THREE.MathUtils.clamp(
        flight.current.lat + Math.cos(headingRad) * distance,
        -72,
        72
      );
      const lon = ((flight.current.lon + Math.sin(headingRad) * distance * 1.5 + 540) % 360) - 180;
      flight.target = {
        lat,
        lon,
        heading,
        speed: THREE.MathUtils.clamp(flight.current.speed + THREE.MathUtils.randFloatSpread(22), 390, 525),
        alt: THREE.MathUtils.clamp(flight.current.alt + THREE.MathUtils.randFloatSpread(900), 28000, 43000)
      };
      flight.progress = 0;
    }

    function interpolateFlight(flight, delta) {
      flight.progress = Math.min(1, flight.progress + delta * simulationSpeed / (TARGET_INTERVAL / 1000));
      const t = flight.progress * flight.progress * (3 - 2 * flight.progress);
      flight.current.lat = THREE.MathUtils.lerp(flight.start.lat, flight.target.lat, t);
      flight.current.lon = THREE.MathUtils.lerp(flight.start.lon, flight.target.lon, t);
      flight.current.heading = THREE.MathUtils.lerp(flight.start.heading, flight.target.heading, t);
      flight.current.speed = THREE.MathUtils.lerp(flight.start.speed, flight.target.speed, t);
      flight.current.alt = THREE.MathUtils.lerp(flight.start.alt, flight.target.alt, t);
      if (flight.progress >= 1) randomizeTarget(flight);
    }

    function updateAircraftVisual(flight, frame) {
      const radius = EARTH_RADIUS + AIRCRAFT_ALTITUDE + (flight.current.alt - 30000) / 120000;
      const position = latLonToVector3(flight.current.lat, flight.current.lon, radius);
      flight.mesh.position.copy(position);
      flight.mesh.quaternion.copy(bearingToQuaternion(flight.current.lat, flight.current.lon, flight.current.heading));
      const bob = 1 + Math.sin(frame * 4 + flight.seed) * 0.035;
      flight.mesh.scale.setScalar(flight === selectedAircraft ? 2.05 * bob : 1.55 * bob);
      flight.mesh.children.slice(0, 3).forEach((child) => {
        child.material = flight === selectedAircraft ? selectedMaterial : aircraftMaterial;
      });

      flight.trailPoints.unshift(latLonToVector3(flight.current.lat, flight.current.lon, EARTH_RADIUS + 0.11));
      flight.trailPoints.length = 36;
      flight.trail.geometry.dispose();
      flight.trail.geometry = new THREE.BufferGeometry().setFromPoints(flight.trailPoints);
      flight.trail.visible = showTrails;
      flight.trail.material.opacity = flight === selectedAircraft ? 0.72 : 0.32;
      flight.trail.material.color.set(flight === selectedAircraft ? 0xffd166 : 0x52e4ff);
    }

    function updateHud() {
      trackedCount.textContent = aircraft.length.toString();
      const average = aircraft.reduce((sum, flight) => sum + flight.current.speed, 0) / aircraft.length;
      avgSpeed.textContent = `${Math.round(average)} kt`;
      lastUpdate.textContent = new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
      feedRate.textContent = `${(TARGET_INTERVAL / 1000 / simulationSpeed).toFixed(1)}s feed`;

      const visibleFlights = [...aircraft]
        .sort((a, b) => b.current.speed - a.current.speed)
        .slice(0, 6);
      flightRows.innerHTML = visibleFlights.map((flight) => `
        <div class="flight-row">
          <div class="flight-id">${flight.id}</div>
          <div class="route">${flight.from} -> ${flight.to}</div>
          <div class="altitude">${Math.round(flight.current.alt / 100) * 100} ft</div>
        </div>
      `).join("");
    }

    function setResponsiveCamera() {
      const small = window.innerWidth < 720;
      camera.fov = small ? 56 : 45;
      camera.position.set(0, small ? 5.1 : 4.7, small ? 13.4 : 11.5);
      controls.minDistance = small ? 7.4 : 6.2;
      controls.maxDistance = small ? 20 : 18;
      camera.updateProjectionMatrix();
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function onPointerDown(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(aircraft.map((flight) => flight.mesh), true);
      if (!hits.length) return;
      let root = hits[0].object;
      while (root.parent && !aircraft.find((flight) => flight.mesh === root)) root = root.parent;
      selectedAircraft = aircraft.find((flight) => flight.mesh === root) || selectedAircraft;
      updateHud();
    }

    speedRange.addEventListener("input", () => {
      simulationSpeed = Number(speedRange.value);
      speedValue.textContent = `${simulationSpeed.toFixed(1)}x`;
      updateHud();
    });

    rotateToggle.addEventListener("click", () => {
      rotateEarth = !rotateEarth;
      rotateToggle.classList.toggle("active", rotateEarth);
    });

    trailsToggle.addEventListener("click", () => {
      showTrails = !showTrails;
      trailsToggle.classList.toggle("active", showTrails);
    });

    resetView.addEventListener("click", () => {
      controls.reset();
      setResponsiveCamera();
    });

    window.addEventListener("resize", onResize);
    renderer.domElement.addEventListener("pointerdown", onPointerDown);

    aircraft.forEach(randomizeTarget);
    setResponsiveCamera();
    updateHud();

    setTimeout(() => loading.classList.add("hidden"), 650);

    function animate() {
      const delta = Math.min(clock.getDelta(), 0.05);
      const elapsed = clock.elapsedTime;

      if (rotateEarth) {
        earthGroup.rotation.y += delta * 0.035;
      }
      clouds.rotation.y += delta * 0.055;
      atmosphere.rotation.y -= delta * 0.012;
      stars.rotation.y += delta * 0.003;

      aircraft.forEach((flight) => {
        interpolateFlight(flight, delta);
        updateAircraftVisual(flight, elapsed);
      });

      if (performance.now() - lastFeedTime > 1000) {
        updateHud();
        lastFeedTime = performance.now();
      }

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
